<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyHorizon Booking</title>
    <link rel="stylesheet" href="css/booking.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">SkyHorizon</div>

        <div class="search-box">
            <input type="text" placeholder="Search destination...">
            <button>Search</button>
        </div>

        <ul class="nav-links">
            <li><a href="h.html">Home</a></li>
            <li><a href="booking.html">Booking</a></li>
            <li><a href="signup.html">Sign up</a></li>
            <li><a href="login.html" class="login-btn">Log in</a></li>
        </ul>
    </nav>

    <div class="hero">
        <div class="overlay"></div>
    </div>

    <div class="container">

        <div class="booking-box">
            <h2>✈️ Book Your Flight</h2>

            <div class="trip-type">
                <label><input type="radio" name="trip" checked> Round-trip</label>
                <label><input type="radio" name="trip"> One way</label>
            </div>

            <div class="input-group">
                <label>Origin</label>
                <input type="text" placeholder="Enter departure city">
            </div>

            <div class="input-group">
                <label>Destination</label>
                <input type="text" placeholder="Enter destination">
            </div>

            <div class="flex-row">
                <div>
                    <label>Departure</label>
                    <input type="date">
                </div>
                <div>
                    <label>Return</label>
                    <input type="date">
                </div>
            </div>

            <div class="flex-row">
                <div>
                    <label>Adults</label>
                    <input type="number" value="1" min="1">
                </div>
                <div>
                    <label>Children</label>
                    <input type="number" value="0" min="0">
                </div>
            </div>

            <button class="search-btn">Search Flights</button>
        </div>

    </div>

</body>
</html>
